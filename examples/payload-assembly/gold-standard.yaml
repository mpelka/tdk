# HAND-WRITTEN ORACLE — the Order Ticket Builder (AUTHORING-V2 shape) as a Backstage
# expert would author it by hand, from the behavioural spec, BEFORE the template was
# compiled. Same BEHAVIOUR as the phase-3a payload-assembly, now the v2 dataflow shape:
# pages-as-TOC (one page, inferred ui:order), the ticket assembler as a
# `roadiehq:utils:jsonata` step (the `build-ticket` derive), a second jsonata step for
# the log line (the `log-line` derive, reading the ticket's `summary` sub-ref), and the
# `debug:log` EFFECT reading it. The JSONata below is idiomatic hand layout (its own
# helper choices — `$sum`-free fold, direct `$count`), NOT copied from the transpiler;
# the tests assert value-for-value AND throw-for-throw agreement, never byte-equality.
apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: order-ticket-builder
  title: Order Ticket Builder
  description: Assemble an order ticket from the submitted line items.
  tags:
    - bakery
    - order
    - ticket
spec:
  type: service
  owner: team-bakery
  parameters:
    - title: Order
      properties:
        customerName:
          type: string
          title: Customer name
        items:
          type: array
          title: Line items
          items:
            type: object
            properties:
              sku:
                type: string
              qty:
                type: number
              options:
                type: array
                items:
                  type: string
              unitPrice:
                type: number
        priority:
          type: string
          title: Priority
          enum:
            - low
            - normal
            - high
        discountCode:
          type: string
          title: Discount code
      # ui:order is INFERRED from the page map's source order (v2 surface).
      ui:order:
        - customerName
        - items
        - priority
        - discountCode
      required:
        - customerName
        - priority
  steps:
    # 1. Assemble the ticket — the `build-ticket` derive (object-returning).
    - id: build-ticket
      name: Build the order ticket
      action: roadiehq:utils:jsonata
      input:
        data:
          customerName: ${{ parameters.customerName }}
          items: ${{ parameters.items }}
          priority: ${{ parameters.priority }}
          discountCode: ${{ parameters.discountCode }}
        # Idiomatic hand-written JSONata. Same VALUES as the transpiled block:
        #   - the $assert guard,
        #   - lineItems with `unitPrice || 0` and an options label (join → scalar),
        #   - a scalar `total` fold of the fee components,
        #   - a spread-merged `meta` (priority override, later keys win),
        #   - `discountPct` via a numeric-prefix match ($number of the prefix, or
        #     missing when there is none — matching parseInt's lenient shim).
        expression: |
          (
            $assert(customerName != "", "customerName is required");
            $lineItems := [items.{
              "sku": sku,
              "qty": qty,
              "unitPrice": unitPrice ? unitPrice : 0,
              "label": $join(options, ", "),
              "lineTotal": (unitPrice ? unitPrice : 0) * qty
            }];
            $baseFee := 5;
            $rushFee := priority = "high" ? 15 : 0;
            $total := ($baseFee ? $baseFee : 0) + ($rushFee ? $rushFee : 0);
            $base := { "channel": "web", "rush": false };
            $meta := priority = "high"
              ? $merge([$base, { "rush": true }])
              : $merge([$base, { "priority": priority }]);
            $m := $match(discountCode, /^\s*([-+]?)([0-9]+)/);
            {
              "summary": "Order for " & customerName & " — " & priority & " priority (" & $string($count(items)) & " item(s))",
              "lineItems": $lineItems,
              "total": $total,
              "meta": $meta,
              "discountPct": $exists($m)
                ? ($m.groups[0] = "-" ? -$number($m.groups[1]) : $number($m.groups[1]))
                : undefined
            }
          )
    # 2. The display line — the `log-line` derive, reading the ticket's summary sub-ref.
    - id: log-line
      name: Log Line
      action: roadiehq:utils:jsonata
      input:
        data:
          summary: ${{ steps['build-ticket'].output.result.summary }}
        expression: |
          "Ticket: " & summary
    # 3. THE EFFECT — log the assembled ticket, reading the log line by handle.
    - id: log-ticket
      name: Log the assembled ticket
      action: debug:log
      input:
        message: ${{ steps['log-line'].output.result }}
  output:
    customer: ${{ parameters.customerName }}
