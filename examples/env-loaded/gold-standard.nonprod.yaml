# HAND-WRITTEN ORACLE — the NONPROD (test) artifact of the Seasonal Menu Publisher.
# Authored from the spec: the TEST menu bakes only vanilla + chocolate (NO
# pistachio-royale — that is prod-only), the oven cluster is test-oven, and the
# beta lifecycle restricts the template to baker-042. The tests diff the compiled
# TEST artifact against this, value-for-value.
apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: seasonal-menu-publisher
  title: Seasonal Menu Publisher
  description: Publish the seasonal cake menu to the storefront.
  tags:
    - bakery
    - menu
    - seasonal
spec:
  type: service
  owner: team-bakery
  # Emitted while pre-GA (state: beta) — invariant (b).
  restrictedToUsers:
    - baker-042
  # extraSpec passthrough — invariant (c).
  bakery_catalogue_metadata:
    category_L1: Signature Bakes
    refresh_cadence: weekly
  parameters:
    - title: Menu
      required:
        - featuredFlavour
        - headline
      properties:
        featuredFlavour:
          type: string
          title: Featured flavour
          # TEST menu — vanilla + chocolate ONLY (invariant a: no pistachio-royale).
          enum:
            - vanilla
            - chocolate
        headline:
          type: string
          title: Storefront headline
  steps:
    - id: publish
      name: Publish the menu
      action: bakery:publish-menu
      input:
        featuredFlavour: ${{ parameters.featuredFlavour }}
        headline: ${{ parameters.headline }}
        cluster: test-oven
  output:
    featured: ${{ parameters.featuredFlavour }}
