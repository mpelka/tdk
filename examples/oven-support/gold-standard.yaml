# HAND-WRITTEN ORACLE — the Oven Support Request as a Backstage expert would author
# it by hand, from the behavioural spec, BEFORE the template was compiled. The five
# `roadiehq:utils:jsonata` steps are the derived values `derive(...)` generates; each
# JSONata below is written in its own idiomatic layout (NOT copied from the
# transpiler), and the steps are ordered the way a human would (lookup, compute,
# register) — NOT the compiler's planned order. The tests assert value-for-value
# agreement across fixtures (execute keys steps by id, so the differing order and
# layout prove behavioural equivalence, never byte-equality). A SEPARATE byte test
# pins the compiled roadie steps against hand-written ones.
apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: oven-support-request
  title: Request oven support
  description: Raise an oven-support ticket, assembling its fields from the submitted form.
  tags:
    - bakery
    - oven
    - support
spec:
  type: service
  owner: team-bakery
  parameters:
    - title: Oven and site
      properties:
        bakeryCode:
          type: string
          title: Bakery site
          enumNames:
            - Riverside
            - Old Town
            - Harbourfront
          enum:
            - BK1
            - BK2
            - BK3
        ovenId:
          type: string
          title: Oven asset ID
      required:
        - bakeryCode
        - ovenId
    - title: The problem
      properties:
        severity:
          type: string
          title: Severity
          enumNames:
            - Low
            - Normal
            - Urgent
          enum:
            - low
            - normal
            - urgent
        problemArea:
          type: string
          title: Problem area
          enum:
            - heating
            - conveyor
            - controls
            - other
      required:
        - severity
        - problemArea
      dependencies:
        problemArea:
          oneOf:
            - properties:
                problemArea:
                  const: heating
            - properties:
                problemArea:
                  const: conveyor
            - properties:
                problemArea:
                  const: controls
            - properties:
                problemArea:
                  const: other
                otherDetail:
                  type: string
                  title: Describe the problem
  steps:
    # 1. Look up the oven — mocked in scenarios; `oven-context` reads its output.
    - id: oven-lookup
      name: Look up the oven in the catalog
      action: bakery:catalog-lookup
      input:
        asset: ${{ parameters.ovenId }}
    # 2. The ticket title — flag urgency, then name the oven and the site.
    - id: ticket-title
      name: Ticket Title
      action: roadiehq:utils:jsonata
      input:
        data:
          bakeryCode: ${{ parameters.bakeryCode }}
          ovenId: ${{ parameters.ovenId }}
          severity: ${{ parameters.severity }}
        expression: |
          (severity = "urgent" ? "[URGENT] " : "")
            & "Oven " & ovenId & " at " & bakeryCode
    # 3. The support SLA, in hours, by severity.
    - id: sla-hours
      name: Sla Hours
      action: roadiehq:utils:jsonata
      input:
        data:
          severity: ${{ parameters.severity }}
        expression: |
          severity = "urgent" ? 4 : (severity = "normal" ? 24 : 72)
    # 4. The problem summary — `otherDetail` is only present for "other"; fall back
    #    to "unspecified" when the conditional field is absent.
    - id: problem-summary
      name: Problem Summary
      action: roadiehq:utils:jsonata
      input:
        data:
          problemArea: ${{ parameters.problemArea }}
          otherDetail: ${{ parameters.otherDetail }}
        expression: |
          problemArea = "other"
            ? (otherDetail ? otherDetail : "unspecified")
            : problemArea
    # 5. The oven context — read the lookup step's record.
    - id: oven-context
      name: Oven Context
      action: roadiehq:utils:jsonata
      input:
        data:
          model: ${{ steps['oven-lookup'].output.model }}
          installedYear: ${{ steps['oven-lookup'].output.installedYear }}
        expression: |
          model & " (installed " & installedYear & ")"
    # 6. The audit tag — used only by the template output.
    - id: audit-tag
      name: Audit Tag
      action: roadiehq:utils:jsonata
      input:
        data:
          bakeryCode: ${{ parameters.bakeryCode }}
          severity: ${{ parameters.severity }}
        expression: |
          bakeryCode & ":" & severity
    # 7. Raise the ticket, consuming the derived values.
    - id: register
      name: Raise the support ticket
      action: bakery:raise-ticket
      input:
        title: ${{ steps['ticket-title'].output.result }}
        slaHours: ${{ steps['sla-hours'].output.result }}
        summary: ${{ steps['problem-summary'].output.result }}
        oven: ${{ steps['oven-context'].output.result }}
        site: ${{ parameters.bakeryCode }}
  output:
    title: ${{ steps['ticket-title'].output.result }}
    slaHours: ${{ steps['sla-hours'].output.result }}
    ticketId: ${{ steps['register'].output.ticketId }}
    audit: ${{ steps['audit-tag'].output.result }}
