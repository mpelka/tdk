# HAND-WRITTEN ORACLE — the Custom Cake Order Wizard as a Backstage expert would
# author its scaffolder YAML by hand, BEFORE the TDK template was compiled. The
# template.test.ts asserts the COMPILED entity agrees with this gold value-for-value
# (never byte-for-byte). Do not regenerate it from compiled output.
apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: custom-cake-order-wizard
  title: Custom Cake Order Wizard
  description: Order a bespoke cake — the form reveals extra fields as you choose.
  tags:
    - cake
    - order
    - bakery
    - wizard
spec:
  type: service
  owner: team-bakery
  parameters:
    # --- Page 1: order type + the wedding showWhen chain (same-page controller) --
    # `orderType` reveals `tiers` + `topper` in its wedding branch; inside that
    # branch `topper` nests a dependency revealing `topperText` (two levels deep).
    - title: Order Type
      required:
        - orderType
      properties:
        orderType:
          type: string
          title: Order type
          enum:
            - standard
            - custom
            - wedding
      dependencies:
        orderType:
          oneOf:
            - properties:
                orderType:
                  const: standard
            - properties:
                orderType:
                  const: custom
            - properties:
                orderType:
                  const: wedding
                tiers:
                  type: number
                  title: Number of tiers
                topper:
                  type: boolean
                  title: Add a cake topper?
              dependencies:
                topper:
                  oneOf:
                    - properties:
                        topper:
                          const: true
                        topperText:
                          type: string
                          title: Topper text
                    - properties:
                        topper:
                          const: false

    # --- Page 2: packaging (dep.when) + rush (rawDependencies), DISTINCT controllers
    - title: Packaging & Speed
      properties:
        packaging:
          type: string
          title: Packaging
          enum:
            - box
            - ribbon
        rush:
          type: boolean
          title: Rush order?
      dependencies:
        # dep.when(packaging): the ribbon branch reveals `ribbonColor`.
        packaging:
          oneOf:
            - properties:
                packaging:
                  const: box
            - properties:
                packaging:
                  const: ribbon
                ribbonColor:
                  type: string
                  title: Ribbon colour
        # rawDependencies passthrough on `rush` — emitted VERBATIM beside the
        # compiled dep.when tree (TDK never re-shapes it).
        rush:
          oneOf:
            - properties:
                rush:
                  const: false
            - properties:
                rush:
                  const: true
                rushJustification:
                  type: string
                  title: Why is this order urgent?

    # --- Page 3: the shared "Baker Notes" fragment (used verbatim) -----------
    # `contactEmail` carries a human `errorMessage` (issue #59). The authored STRING
    # covers both failures: it sits on the field (its `format: email` failure) AND
    # lifts to the page's `errorMessage.required` (its missing-value failure), so
    # ajv-errors renders one message either way instead of ajv's raw phrasing.
    - title: Baker Notes
      required:
        - contactEmail
      errorMessage:
        required:
          contactEmail: Enter a valid contact email so the baker can reach you.
      properties:
        bakerNotes:
          type: string
          title: Notes for the baker
          ui:widget: textarea
        contactEmail:
          type: string
          title: Contact email
          format: email
          errorMessage: Enter a valid contact email so the baker can reach you.

    # --- Page 4: the COMPOSED form — SAME synthesis, authored ADR-0025's way ----
    # In TDK this page uses NO `dep.*`: every conditional field carries a
    # `.showWhen(...)` predicate and the compiler synthesises this tree. Two
    # independent discriminators sit on one page:
    #   - `deliveryMethod` reveals `courierSpeed` on the courier branch, and an
    #     `all(...)` AND-chain (courier AND express) nests `insurance` INSIDE
    #     `courierSpeed`'s express branch — two levels deep, like page 1.
    #   - `contactPref` reveals `mobile` via `any(sms, call)` (== .in) and
    #     `notifyEmail` via `.in(["email", "sms"])`; both name `contactPref`, so
    #     they GROUP into one dependency with the field(s) per matching branch.
    - title: Delivery
      properties:
        deliveryMethod:
          type: string
          title: Delivery method
          enum:
            - collection
            - courier
        contactPref:
          type: string
          title: Contact preference
          enum:
            - sms
            - email
            - call
      dependencies:
        deliveryMethod:
          oneOf:
            - properties:
                deliveryMethod:
                  const: collection
            - properties:
                deliveryMethod:
                  const: courier
                courierSpeed:
                  type: string
                  title: Courier speed
                  enum:
                    - standard
                    - express
              dependencies:
                courierSpeed:
                  oneOf:
                    - properties:
                        courierSpeed:
                          const: standard
                    - properties:
                        courierSpeed:
                          const: express
                        insurance:
                          type: boolean
                          title: Insure the delivery?
        contactPref:
          oneOf:
            - properties:
                contactPref:
                  const: sms
                mobile:
                  type: string
                  title: Mobile number
                notifyEmail:
                  type: string
                  title: Notification email
            - properties:
                contactPref:
                  const: email
                notifyEmail:
                  type: string
                  title: Notification email
            - properties:
                contactPref:
                  const: call
                mobile:
                  type: string
                  title: Mobile number
  steps:
    - id: log-order
      name: Log the order
      action: debug:log
      input:
        message: "Order type: ${{ parameters.orderType }}"
  output:
    orderType: ${{ parameters.orderType }}
