# HAND-WRITTEN ORACLE — the RESOLVED Oven Provisioner artifact as a Backstage
# expert would author it. The head-baker resolver has ALREADY run: the concrete id
# `baker-pastry-01` appears where the `headBakerOf("pastry")` marker was — in the
# provision step's `if:` and the record step's `headBaker` input. The marker itself
# never appears. The tests assert the compiled (resolved) artifact agrees with this.
apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: oven-provisioner
  title: Oven Provisioner
  description: Provision a bakery oven for a station.
  tags:
    - bakery
    - oven
    - infra
spec:
  type: service
  owner: team-bakery
  parameters:
    required:
      - station
      - capacity
      - ovenModel
    properties:
      station:
        type: string
        title: Station
        enum:
          - pastry
          - bread
      capacity:
        type: number
        title: Capacity (trays)
      # HOOK B (field): the CakePickerWithDefault picker.
      ovenModel:
        type: string
        title: Oven model
        ui:field: CakePickerWithDefault
        ui:options:
          path: bakery/oven-models
          default: deck-3000
  steps:
    # HOOK B (action): the provision step. Its `if:` is the RESOLVED head-baker id
    # (from the resolver marker) — a non-empty string, so the step runs. `model`
    # consumes the CakePickerWithDefault field, so the custom field's value lands here.
    - id: provision
      action: bakery:provision-oven
      input:
        station: ${{ parameters.station }}
        capacity: ${{ parameters.capacity }}
        model: ${{ parameters.ovenModel }}
      if: baker-pastry-01
    - id: record
      name: Record who owns the oven
      action: debug:log
      input:
        # HOOK A (resolver): the RESOLVED id lands here — never the marker.
        headBaker: baker-pastry-01
        ovenId: ${{ steps.provision.output.ovenId }}
  output:
    station: ${{ parameters.station }}
    ovenModel: ${{ parameters.ovenModel }}
